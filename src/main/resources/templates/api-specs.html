<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/default}">
<head><title>API 명세서 현황</title></head>
<body>

<h4 layout:fragment="pageTitle"><i class="bi bi-journal-code"></i> API 명세서 현황</h4>

<div layout:fragment="content">

    <!-- 프로젝트 선택 + 요약 -->
    <div class="row g-3 mb-4">
        <div class="col-md-6">
            <div class="stat-card">
                <h6 class="mb-2"><i class="bi bi-folder2-open"></i> 프로젝트 선택</h6>
                <select class="form-select" id="projectSelect" onchange="changeProject()">
                    <option th:each="p : ${projects}"
                            th:value="${p.gitlabProjectId}"
                            th:text="${p.pageTitlePrefix != null ? p.pageTitlePrefix + ' (' + p.gitlabPath + ')' : p.gitlabPath}"
                            th:selected="${p.gitlabProjectId == selectedProjectId}">
                    </option>
                </select>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card">
                <div class="d-flex align-items-center justify-content-between">
                    <div>
                        <div class="stat-value">
                            <span th:text="${processedCount}">0</span>
                            <small class="text-muted fs-6">/ <span th:text="${totalCount}">0</span></small>
                        </div>
                        <div class="stat-label">Controller 처리 완료</div>
                    </div>
                    <div class="stat-icon" style="background: #dcfce7; color: #16a34a;">
                        <i class="bi bi-check-circle"></i>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card">
                <div class="d-flex align-items-center justify-content-between">
                    <div>
                        <div class="stat-value" th:text="${totalCount - processedCount}">0</div>
                        <div class="stat-label">미처리</div>
                    </div>
                    <div class="stat-icon" style="background: #fee2e2; color: #dc2626;">
                        <i class="bi bi-hourglass-split"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 진행률 바 -->
    <div class="stat-card mb-4" th:if="${totalCount > 0}">
        <div class="d-flex justify-content-between mb-1">
            <small class="text-muted">처리 진행률</small>
            <small class="fw-medium"
                   th:text="${totalCount > 0 ? (processedCount * 100 / totalCount) + '%' : '0%'}"></small>
        </div>
        <div class="progress" style="height: 8px;">
            <div class="progress-bar bg-success" role="progressbar"
                 th:style="'width: ' + (${totalCount > 0 ? (processedCount * 100 / totalCount) : 0}) + '%'"></div>
        </div>
    </div>

    <!-- Controller 목록 -->
    <div class="table-card">
        <div class="p-3 border-bottom d-flex justify-content-between align-items-center">
            <h6 class="mb-0"><i class="bi bi-list-ul"></i> Controller 목록</h6>
            <button class="btn btn-outline-secondary btn-sm" id="syncBtn" onclick="syncConfluence()" title="Confluence와 DB 동기화">
                <i class="bi bi-arrow-repeat"></i> 동기화
            </button>
        </div>
        <table class="table table-hover mb-0">
            <thead>
            <tr>
                <th>상태</th>
                <th>Controller</th>
                <th>파일 경로</th>
                <th>Confluence 페이지</th>
                <th>API 수</th>
                <th style="width: 100px;">관리</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="spec : ${controllerSpecs}"
                th:id="'row-' + ${#strings.replace(spec.controllerPath, '/', '_')}">
                <td>
                    <span th:id="'status-' + ${#strings.replace(spec.controllerPath, '/', '_')}">
                        <span th:if="${spec.processed}" class="badge badge-done">완료</span>
                        <span th:unless="${spec.processed}" class="badge badge-pending">미처리</span>
                    </span>
                </td>
                <td class="fw-medium" th:text="${spec.controllerName}"></td>
                <td>
                    <code th:text="${spec.controllerPath}" class="text-muted" style="font-size: 12px;"></code>
                </td>
                <td>
                    <a th:if="${spec.processed}"
                       th:href="${confluenceUrl + '/pages/viewpage.action?pageId=' + spec.pageId}"
                       th:text="${spec.pageTitle}"
                       target="_blank"
                       class="text-decoration-none"></a>
                    <span th:unless="${spec.processed}" class="text-muted">-</span>
                </td>
                <td>
                    <span th:if="${spec.processed}">
                        <span class="badge bg-primary" th:text="${spec.apiCount} + '개'"></span>
                    </span>
                    <span th:unless="${spec.processed}" class="text-muted">-</span>
                </td>
                <td th:id="'action-' + ${#strings.replace(spec.controllerPath, '/', '_')}">
                    <span th:if="${spec.processed}">
                        <button class="btn btn-outline-warning btn-sm"
                                th:attr="onclick='regenerate(\'' + ${spec.controllerPath} + '\')'"
                                title="재생성">
                            <i class="bi bi-arrow-clockwise"></i>
                        </button>
                    </span>
                    <span th:unless="${spec.processed}">
                        <button class="btn btn-outline-warning btn-sm"
                                th:attr="onclick='regenerate(\'' + ${spec.controllerPath} + '\')'"
                                title="생성">
                            <i class="bi bi-plus-lg"></i>
                        </button>
                    </span>
                </td>
            </tr>

            <!-- API 하위 목록 (접기/펼치기) -->
            <tr th:each="spec : ${controllerSpecs}" th:if="${spec.processed}"
                th:id="'apis-' + ${#strings.replace(spec.controllerPath, '/', '_')}"
                class="api-detail-row" style="display: none;">
                <td></td>
                <td colspan="5">
                    <div class="ps-3">
                        <small class="text-muted mb-2 d-block">하위 API 페이지</small>
                        <div th:each="api : ${spec.apiPages}" class="d-flex align-items-center mb-1">
                            <i class="bi bi-file-earmark-text text-primary me-2"></i>
                            <span th:text="${api.title}" style="font-size: 13px;"></span>
                        </div>
                        <div th:if="${#lists.isEmpty(spec.apiPages)}" class="text-muted">
                            <small>하위 API 페이지가 없습니다.</small>
                        </div>
                    </div>
                </td>
            </tr>

            <tr th:if="${#lists.isEmpty(controllerSpecs)}">
                <td colspan="6" class="text-center text-muted py-4">Controller가 없습니다.</td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- 알림 토스트 -->
    <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 9999">
        <div id="toast" class="toast" role="alert">
            <div class="toast-header">
                <strong class="me-auto" id="toastTitle">알림</strong>
                <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
            </div>
            <div class="toast-body" id="toastBody"></div>
        </div>
    </div>

    <!-- 로딩 오버레이 -->
    <div id="loadingOverlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%;
         background:rgba(0,0,0,0.3); z-index:9998; justify-content:center; align-items:center;">
        <div class="text-center text-white">
            <div class="spinner-border mb-3" role="status"></div>
            <p>API 명세서를 생성 중입니다...</p>
        </div>
    </div>

    <script>
        function syncConfluence() {
            const btn = document.getElementById('syncBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm" style="width:14px;height:14px;"></span> 동기화 중...';

            fetch('/api/api-specs/sync', { method: 'POST' })
                .then(r => r.json())
                .then(result => {
                    showToast('성공', result.message, true);
                    setTimeout(() => location.reload(), 1000);
                })
                .catch(err => {
                    showToast('오류', '동기화에 실패했습니다.', false);
                    btn.disabled = false;
                    btn.innerHTML = '<i class="bi bi-arrow-repeat"></i> 동기화';
                });
        }

        function changeProject() {
            const projectId = document.getElementById('projectSelect').value;
            window.location.href = '/api-specs?projectId=' + projectId;
        }

        function toggleApis(controllerPath) {
            const rowId = 'apis-' + controllerPath.replaceAll('/', '_');
            const row = document.getElementById(rowId);
            if (row) {
                row.style.display = row.style.display === 'none' ? '' : 'none';
            }
        }

        function getRowId(controllerPath) {
            return controllerPath.replaceAll('/', '_');
        }

        function setRowProcessing(controllerPath, progress) {
            const rowId = getRowId(controllerPath);
            const statusEl = document.getElementById('status-' + rowId);
            const actionEl = document.getElementById('action-' + rowId);

            // 상태 배지
            let badgeText = '진행중';
            if (progress && progress.totalApis > 0) {
                badgeText = progress.completedApis + '/' + progress.totalApis;
            }
            if (statusEl) {
                statusEl.innerHTML = '<span class="badge" style="background:#dbeafe;color:#2563eb;">' +
                    '<span class="spinner-border spinner-border-sm me-1" style="width:12px;height:12px;"></span>' + badgeText + '</span>';
            }
            if (actionEl) {
                actionEl.innerHTML = '<button class="btn btn-outline-secondary btn-sm" disabled>' +
                    '<span class="spinner-border spinner-border-sm" style="width:14px;height:14px;"></span></button>';
            }

            // 진행 상세 행 표시
            const row = document.getElementById('row-' + rowId);
            if (row && progress && progress.currentApiName) {
                let progressRow = document.getElementById('progress-' + rowId);
                if (!progressRow) {
                    progressRow = document.createElement('tr');
                    progressRow.id = 'progress-' + rowId;
                    progressRow.className = 'progress-detail-row';
                    row.parentNode.insertBefore(progressRow, row.nextSibling);
                }
                progressRow.innerHTML = '<td></td><td colspan="5">' +
                    '<div class="ps-3 d-flex align-items-center" style="font-size:13px;">' +
                    '<span class="spinner-border spinner-border-sm text-primary me-2" style="width:14px;height:14px;"></span>' +
                    '<span class="text-muted">' + progress.currentApiName + '</span>' +
                    '</div></td>';
            }
        }

        function removeProgressRows() {
            document.querySelectorAll('.progress-detail-row').forEach(row => row.remove());
        }

        const MAX_CONCURRENT = 2;
        let serverActiveCount = 0;

        function regenerate(controllerPath) {
            if (serverActiveCount >= MAX_CONCURRENT) {
                showToast('알림', '동시에 ' + MAX_CONCURRENT + '개까지만 실행할 수 있습니다. 완료 후 다시 시도하세요.', false);
                return;
            }
            if (!confirm('해당 Controller의 API 명세서를 (재)생성하시겠습니까?\nLLM 호출이 발생하며 시간이 소요됩니다.')) return;

            const projectId = document.getElementById('projectSelect').value;
            serverActiveCount++;

            // 즉시 해당 행을 진행중 상태로 변경
            setRowProcessing(controllerPath, null);
            hadProcessing = true;
            setTimeout(pollProcessingStatus, 3000);

            fetch('/api/api-specs/regenerate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ projectId: parseInt(projectId), controllerPath: controllerPath })
            })
            .then(r => r.json())
            .then(result => {
                showToast('성공', result.message, true);
            })
            .catch(err => {
                showToast('오류', '재생성에 실패했습니다.', false);
            });
        }

        // 진행 중인 Controller가 있었는지 추적
        let hadProcessing = false;
        let reloadScheduled = false;
        // 사용자가 직접 프로젝트를 선택했는지 추적 (URL에 projectId 파라미터가 있으면 직접 선택한 것)
        let userSelectedProject = new URLSearchParams(window.location.search).has('projectId');

        function pollProcessingStatus() {
            fetch('/api/api-specs/processing')
                .then(r => r.json())
                .then(data => {
                    serverActiveCount = data.count;
                    const currentProjectId = parseInt(document.getElementById('projectSelect').value);
                    const processingProjectIds = data.projectIds || [];
                    const initializingProjects = data.initializingProjects || [];
                    const isActive = data.count > 0 || initializingProjects.length > 0;

                    if (isActive) {
                        hadProcessing = true;

                        // 사용자가 직접 선택하지 않은 경우에만 처리 중인 프로젝트로 자동 전환
                        if (!userSelectedProject
                            && !processingProjectIds.includes(currentProjectId)
                            && !initializingProjects.includes(currentProjectId)) {
                            const targetId = initializingProjects[0] || (processingProjectIds.length > 0 ? processingProjectIds[0] : null);
                            if (targetId) {
                                window.location.href = '/api-specs?projectId=' + targetId;
                                return;
                            }
                        }

                        // DOM에 있는 행은 스피너 + progress 표시
                        const progressData = data.progress || {};
                        data.processing.forEach(path => {
                            const rowId = getRowId(path);
                            const statusEl = document.getElementById('status-' + rowId);
                            if (statusEl) {
                                setRowProcessing(path, progressData[path] || null);
                            }
                        });

                        // 초기화 중인 프로젝트가 현재 프로젝트이면 안내 표시
                        if (initializingProjects.includes(currentProjectId)) {
                            showInitializingBanner();
                        }

                        setTimeout(pollProcessingStatus, 3000);
                    } else if (hadProcessing && !reloadScheduled) {
                        // 모든 처리 완료 — 한 번만 리로드
                        reloadScheduled = true;
                        removeProgressRows();
                        location.reload();
                    } else {
                        // 처리 중인 것이 없으면 주기적으로 체크 (신규 프로젝트 추가 대비)
                        setTimeout(pollProcessingStatus, 5000);
                    }
                })
                .catch(() => {
                    setTimeout(pollProcessingStatus, 5000);
                });
        }

        function showInitializingBanner() {
            if (document.getElementById('initBanner')) return;
            const table = document.querySelector('.table-card');
            if (!table) return;
            const banner = document.createElement('div');
            banner.id = 'initBanner';
            banner.className = 'alert alert-info d-flex align-items-center mb-0 border-0 rounded-0';
            banner.style.fontSize = '14px';
            banner.innerHTML = '<span class="spinner-border spinner-border-sm me-2" style="width:16px;height:16px;"></span>' +
                '프로젝트 초기화 중입니다. Controller 분석 및 API 명세서 생성이 곧 시작됩니다...';
            table.insertBefore(banner, table.firstChild);
        }

        // 페이지 로드 시 진행 중인 작업 확인
        pollProcessingStatus();

        function showToast(title, message, success) {
            document.getElementById('toastTitle').textContent = title;
            document.getElementById('toastBody').textContent = message;
            const toastEl = document.getElementById('toast');
            toastEl.classList.remove('text-bg-success', 'text-bg-danger');
            toastEl.classList.add(success ? 'text-bg-success' : 'text-bg-danger');
            new bootstrap.Toast(toastEl).show();
        }
    </script>

</div>

</body>
</html>
