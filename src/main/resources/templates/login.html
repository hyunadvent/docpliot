<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - DocPilot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

<div class="auth-container">
    <div class="auth-card">
        <div class="text-center mb-4">
            <i class="bi bi-file-earmark-text" style="font-size: 40px; color: #3b82f6;"></i>
            <h3 class="mt-2">DocPilot</h3>
            <p class="text-muted" style="font-size: 14px;">문서 자동화 에이전트</p>
        </div>

        <!-- 에러 메시지 -->
        <div th:if="${errorMessage}" class="alert alert-danger" style="font-size: 14px;">
            <i class="bi bi-exclamation-circle"></i> <span th:text="${errorMessage}"></span>
        </div>

        <!-- 로그아웃 메시지 -->
        <div th:if="${logoutMessage}" class="alert alert-info" style="font-size: 14px;">
            <i class="bi bi-check-circle"></i> <span th:text="${logoutMessage}"></span>
        </div>

        <!-- 회원가입 성공 메시지 -->
        <div th:if="${success}" class="alert alert-success" style="font-size: 14px;">
            <i class="bi bi-check-circle"></i> <span th:text="${success}"></span>
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label">아이디</label>
                <input type="text" name="username" class="form-control" placeholder="아이디를 입력하세요" required autofocus>
            </div>
            <div class="mb-3">
                <label class="form-label">비밀번호</label>
                <input type="password" name="password" class="form-control" placeholder="비밀번호를 입력하세요" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 mb-3">로그인</button>
        </form>

        <div class="text-center">
            <a th:href="@{/register}" class="text-muted" style="font-size: 14px;">회원가입</a>
        </div>
    </div>
</div>

</body>
</html>
