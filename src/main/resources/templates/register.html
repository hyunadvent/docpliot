<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - DocPilot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

<div class="auth-container">
    <div class="auth-card">
        <div class="text-center mb-4">
            <i class="bi bi-person-plus" style="font-size: 40px; color: #3b82f6;"></i>
            <h3 class="mt-2">회원가입</h3>
            <p class="text-muted" style="font-size: 14px;">DocPilot 사용을 위해 가입 후 관리자 승인이 필요합니다.</p>
        </div>

        <div th:if="${error}" class="alert alert-danger" style="font-size: 14px;">
            <i class="bi bi-exclamation-circle"></i> <span th:text="${error}"></span>
        </div>

        <form th:action="@{/register}" method="post">
            <div class="mb-3">
                <label class="form-label">아이디 <span class="text-danger">*</span></label>
                <input type="text" name="username" class="form-control" placeholder="아이디를 입력하세요" required autofocus>
            </div>
            <div class="mb-3">
                <label class="form-label">비밀번호 <span class="text-danger">*</span></label>
                <input type="password" name="password" class="form-control" placeholder="비밀번호를 입력하세요" required>
            </div>
            <div class="mb-3">
                <label class="form-label">이메일 <span class="text-danger">*</span></label>
                <input type="email" name="email" class="form-control" placeholder="이메일을 입력하세요" required>
            </div>
            <div class="mb-3">
                <label class="form-label">이름 <span class="text-danger">*</span></label>
                <input type="text" name="name" class="form-control" placeholder="이름을 입력하세요" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 mb-3">가입 요청</button>
        </form>

        <div class="text-center">
            <a th:href="@{/login}" class="text-muted" style="font-size: 14px;">로그인으로 돌아가기</a>
        </div>
    </div>
</div>

</body>
</html>
