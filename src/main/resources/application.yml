server:
  port: 8080

spring:
  application:
    name: docpilot
  datasource:
    url: jdbc:h2:file:./data/docpilot;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console

# GitLab 설정
gitlab:
  url: https://gitlab.hancom.io

